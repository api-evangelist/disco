aid: disco
name: DISCO
description: 'DISCO is an AI-powered eDiscovery platform providing a REST API for
  uploading documents, managing review sets, running AI-assisted review, tagging documents,
  and exporting productions. The API enables programmatic access to data-usage change
  events, review database metrics, and organizational data for invoice reconciliation,
  anomaly detection, and subscription management.

  '
